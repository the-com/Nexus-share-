<title>PORTAL — แชร์จอ</title>
<script>
// Load PeerJS with multiple CDN fallbacks
(function() {
  const CDNs = [
    'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js',
    'https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js',
  ];
  let idx = 0;
  function tryLoad() {
    if (idx >= CDNs.length) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Sarabun,sans-serif;color:#ff4466;background:#060608;flex-direction:column;gap:16px;padding:24px;text-align:center"><div style="font-size:32px">❌</div><div style="font-size:18px;font-weight:600">โหลด PeerJS ไม่ได้</div><div style="font-size:14px;color:#5a6080">กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วรีโหลดหน้านี้</div><button onclick="location.reload()" style="margin-top:12px;padding:12px 28px;background:#00e5ff;border:none;border-radius:10px;font-family:Sarabun,sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:#000">รีโหลด</button></div>';
      return;
    }
    const s = document.createElement('script');
    s.src = CDNs[idx];
    s.onload = () => { window._peerReady = true; };
    s.onerror = () => { idx++; tryLoad(); };
    document.head.appendChild(s);
  }
  tryLoad();
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
